<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By Exagonal — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --border: #1e1e1e;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --golddim: rgba(201,168,76,0.08);
    --goldborder: rgba(201,168,76,0.25);
    --text: #f0ece0;
    --muted: #5a5648;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 60%),
      linear-gradient(rgba(201,168,76,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.015) 1px, transparent 1px);
    background-size: 100%, 48px 48px, 48px 48px;
    pointer-events: none;
  }
  .box {
    position: relative;
    width: 100%;
    max-width: 360px;
    padding: 3rem;
    border: 1px solid var(--goldborder);
    background: #0c0c0c;
  }
  /* Esquinas decorativas doradas */
  .box::before, .box::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
  }
  .box::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--gold);
    border-left: 2px solid var(--gold);
  }
  .box::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--gold);
    border-right: 2px solid var(--gold);
  }
  .ornament {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.3em;
    margin-bottom: 1.5rem;
    opacity: 0.7;
  }
  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
    color: var(--text);
  }
  .sub {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .flash {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold);
    padding: 0.75rem 1rem;
    font-size: 0.7rem;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }
  label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 0.85rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.5rem;
    letter-spacing: 0.1em;
  }
  input[type="password"]:focus { border-color: var(--goldborder); }
  button {
    width: 100%;
    background: transparent;
    border: 1px solid var(--goldborder);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.25s;
  }
  button:hover {
    background: var(--gold);
    color: #080808;
    border-color: var(--gold);
  }
  .back {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.65rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .back:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="box">
  <div class="ornament">◈ BY EXAGONAL</div>
  <h2>Acceso</h2>
  <div class="sub">Panel de administración</div>
  {% with msgs = get_flashed_messages() %}
    {% if msgs %}
      <div class="flash">{{ msgs[0] }}</div>
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label>Contraseña</label>
    <input type="password" name="password" autofocus placeholder="••••••••••">
    <button type="submit">Entrar →</button>
  </form>
  <a href="/" class="back">← volver al sitio</a>
</div>
</body>
</html>
