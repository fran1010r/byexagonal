<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --border: #222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #555;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .box {
    position: relative;
    width: 100%;
    max-width: 380px;
    padding: 3rem;
    border: 1px solid var(--border);
    background: #111;
  }
  .box::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 40px; height: 40px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
  }
  .label-top {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
  }
  h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 2.5rem;
    letter-spacing: -0.02em;
  }
  .flash {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: #ff6b35;
    padding: 0.75rem 1rem;
    font-size: 0.75rem;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
  }
  label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  input[type="password"] {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 0.9rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.5rem;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  .back {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
  }
  .back:hover { color: var(--text); }
</style>
</head>
<body>
<div class="box">
  <div class="label-top">Panel de administración</div>
  <h2>Acceso</h2>
  {% with msgs = get_flashed_messages() %}
    {% if msgs %}
      <div class="flash">{{ msgs[0] }}</div>
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label>Contraseña</label>
    <input type="password" name="password" autofocus placeholder="••••••••">
    <button type="submit">Entrar →</button>
  </form>
  <a href="/" class="back">← volver al sitio</a>
</div>
</body>
</html>
